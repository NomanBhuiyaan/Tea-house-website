<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea house</title>

    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome cdm -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body class="p-4 manrope_fonts">
    <!-- banner section start here -->

    <div
      class="parent_div min-h-[200px] max-w-[1250px] mx-auto flex flex-col md:flex-row justify-between"
    >
      <div class="left_div">
        <h1 class="text-[50px] md:text-[60px] lg:text-[80px] font-bold">
          It's good <br />
          tea time at The <br />
          Tea House
        </h1>
        <p class="text-[18px] my-[30px]">
          Tea and Botanical Solutions Supplier Give Optimum <br />
          Satisfaction To Your Taste Buds.
        </p>
        <button
          class="w-[200px] h-[64px] text-xl font-semibold text-white rounded-lg bg-gradient-to-l from-[#ff0000] to-[#ff8938]"
        >
          <span>Explore More</span>
          <i class="fa-solid fa-arrow-right -rotate-45"></i>
        </button>
      </div>

      <div class="right_div relative">
        <img src="/images/banner.png" class="relative top-[100px]" alt="" />

        <div
          class="w-[200px] md:w-[255px] h-[80px] md:h-[100px] rounded-xl flex items-center shadow-2xl bg-white absolute left-[40px] md:left-[100px] "
        >
          <span class="text-4xl"><i class="fa-solid fa-star"></i></span>
          <div class="ml-4">
            <p class="text-3xl font-bold">5.00</p>
            <p class="text-[#777777]">Trust Pilot Rating</p>
          </div>
        </div>
      </div>
    </div>

    








  
  
  
  </body>
</html>
